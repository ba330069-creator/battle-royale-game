<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Royale Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #282c34;
            color: white;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        #leaderboard {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
        }
        #leaderboard th, #leaderboard td {
            border: 1px solid #ffffff;
            padding: 8px;
            text-align: center;
        }
        #leaderboard th {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>
    <h1>Battle Royale Game</h1>
    <div id="game-interface">
        <p>Welcome to the Battle Royale Game!</p>
        <button>Start Game</button>
        <button>Join Game</button>
    </div>
    <h2>Leaderboard</h2>
    <table id="leaderboard">
        <tr>
            <th>Player Name</th>
            <th>Score</th>
        </tr>
        <tr>
            <td>Player 1</td>
            <td>1500</td>
        </tr>
        <tr>
            <td>Player 2</td>
            <td>1200</td>
        </tr>
        <tr>
            <td>Player 3</td>
            <td>1000</td>
        </tr>
    </table>
</body>
</html>
